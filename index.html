<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB Радар Скидок</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <nav class="bg-slate-800 p-4 sticky top-0 z-50 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-pink-500">📡 WB RADAR</h1>
            <div id="stats" class="text-xs text-slate-400">Загрузка данных...</div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
            </div>
    </main>

    <script>
        // Функция генерации ссылки на картинку WB (у них сложная логика корзин)
        function getWbImage(id) {
            const vol = Math.floor(id / 100000);
            const part = Math.floor(id / 1000);
            // Пробуем корзину 01, если не сработает, в реальном проекте нужен перебор корзин
            return `https://basket-01.wb.ru/vol${vol}/nm${id}/images/big/1.jpg`;
        }

        async function init() {
            try {
                const res = await fetch('data/deals.json');
                const deals = await res.json();
                document.getElementById('stats').innerText = `Найдено: ${deals.length} супер-цен`;
                
                const grid = document.getElementById('grid');
                grid.innerHTML = deals.map(item => `
                    <div class="bg-slate-800 rounded-lg overflow-hidden flex flex-col hover:scale-[1.02] transition-transform">
                        <div class="relative">
                            <img src="${getWbImage(item.id)}" alt="${item.name}" class="w-full h-48 object-cover">
                            <span class="absolute top-2 right-2 bg-pink-600 text-white text-xs font-bold px-2 py-1 rounded">-${item.discount}%</span>
                        </div>
                        <div class="p-3 flex-grow flex flex-col">
                            <div class="text-xs text-slate-400 mb-1">${item.brand}</div>
                            <h2 class="text-sm font-medium leading-tight h-8 overflow-hidden mb-2">${item.name}</h2>
                            <div class="mt-auto">
                                <div class="flex items-baseline gap-2">
                                    <span class="text-lg font-bold text-white">${item.price} ₽</span>
                                    <span class="text-xs text-slate-500 line-through">${item.old_price} ₽</span>
                                </div>
                                <div class="flex items-center text-xs text-yellow-500 mt-1">
                                    ⭐ ${item.rating} <span class="text-slate-500 ml-1">(${item.reviews})</span>
                                </div>
                                <a href="https://www.wildberries.ru/catalog/${item.id}/detail.aspx" target="_blank" 
                                   class="block w-full text-center bg-pink-600 hover:bg-pink-700 text-white text-sm font-bold py-2 rounded-md mt-3 transition">
                                    Посмотреть
                                </a>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('stats').innerText = 'Ошибка загрузки данных. Запустите скрипт первый раз.';
            }
        }
        init();
    </script>
</body>
</html>
