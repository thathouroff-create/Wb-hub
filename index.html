<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Market Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-5">
    <header class="text-center mb-10">
        <h1 class="text-3xl font-bold text-blue-400">📊 IT Market Radar</h1>
        <p class="text-slate-400">Анализ вакансий в реальном времени (HH.ru)</p>
    </header>

    <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 container mx-auto">
        </div>

    <script>
        async function init() {
            try {
                const res = await fetch('data/deals.json');
                const data = await res.json();
                const grid = document.getElementById('grid');
                
                grid.innerHTML = data.map(item => `
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                        <div class="text-blue-400 text-sm font-bold mb-2 uppercase">${item.brand}</div>
                        <h2 class="text-xl font-bold mb-4">${item.name}</h2>
                        <div class="flex justify-between items-end">
                            <div>
                                <div class="text-slate-400 text-xs">Средняя зарплата (от)</div>
                                <div class="text-3xl font-black text-white">${item.price.toLocaleString()} ₽</div>
                            </div>
                            <div class="text-right">
                                <div class="text-slate-400 text-xs">Вакансий</div>
                                <div class="text-lg font-bold text-blue-300">${item.count}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.body.innerHTML += '<p class="text-center mt-10">Данные еще не собраны. Запустите Action.</p>';
            }
        }
        init();
    </script>
</body>
</html>
